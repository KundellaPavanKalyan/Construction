<div class="login-wrap d-flex align-items-center justify-content-center py-5 position-relative">
  <a routerLink="/" class="login-close" aria-label="Back to landing page" title="Back to home">&times;</a>
  <div class="card shadow-lg border-0 login-card">
    <div class="card-body p-4 p-md-5">
      <h1 class="h4 mb-4 text-center">Sign in</h1>
      <div *ngIf="error" class="alert alert-danger py-2">{{ error }}</div>
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="form-control" [(ngModel)]="username" autocomplete="username" (keyup.enter)="submit()" />
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" [(ngModel)]="password" autocomplete="current-password" (keyup.enter)="submit()" />
      </div>
      <button type="button" class="btn btn-warning w-100 fw-semibold text-dark" [disabled]="busy" (click)="submit()">
        {{ busy ? 'Signing in…' : 'Login' }}
      </button>
      <p class="small text-muted mt-3 mb-0 text-center">Default: admin / admin (change in API appsettings)</p>
    </div>
  </div>
</div>
