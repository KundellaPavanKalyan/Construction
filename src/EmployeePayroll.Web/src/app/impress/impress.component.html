<div class="d-flex flex-wrap text-center justify-content-center align-items-center gap-10 mb-10 mt-10">
  <div>
    <h1 class="h3 mb-12 text-center fw-bold">Impress</h1>
  </div>
  <div class="d-flex flex-wrap gap-2 ms-md-auto">
    <button type="button" class="btn btn-outline-secondary" [disabled]="busy" (click)="load()">Reload</button>
    <button type="button" class="btn btn-warning text-dark fw-semibold" [disabled]="busy" (click)="saveAll()">
      Save to payroll
    </button>
  </div>
  <div class="w-100 text-end text-md-end small text-muted"><strong>Period:</strong> {{ periodLabel }} — {{ rows.length }} name(s)</div>
</div>

<div *ngIf="error" class="alert alert-danger">{{ error }}</div>
<div *ngIf="success" class="alert alert-success">{{ success }}</div>

<div class="card shadow-sm">
  <div class="table-responsive">
    <table class="table table-striped table-hover mb-0 impress-grid">
      <thead class="table-light">
        <tr>
          <th>Name</th>
          <th class="text-end">Week1</th>
          <th class="text-end">Week2</th>
          <th class="text-end">Week3</th>
          <th class="text-end">Week4</th>
          <th class="text-end">Total</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of rows">
          <td class="fw-medium">{{ row.employeeName }}</td>
          <td class="text-end">
            <input
              type="number"
              class="form-control form-control-sm text-end impress-week-input"
              [(ngModel)]="row.week1"
              (ngModelChange)="onWeekChange(row)"
              min="0"
              step="0.01"
            />
          </td>
          <td class="text-end">
            <input
              type="number"
              class="form-control form-control-sm text-end impress-week-input"
              [(ngModel)]="row.week2"
              (ngModelChange)="onWeekChange(row)"
              min="0"
              step="0.01"
            />
          </td>
          <td class="text-end">
            <input
              type="number"
              class="form-control form-control-sm text-end impress-week-input"
              [(ngModel)]="row.week3"
              (ngModelChange)="onWeekChange(row)"
              min="0"
              step="0.01"
            />
          </td>
          <td class="text-end">
            <input
              type="number"
              class="form-control form-control-sm text-end impress-week-input"
              [(ngModel)]="row.week4"
              (ngModelChange)="onWeekChange(row)"
              min="0"
              step="0.01"
            />
          </td>
          <td class="text-end fw-semibold">{{ formatAmount(rowTotal(row)) }}</td>
        </tr>
        <tr *ngIf="rows.length === 0 && !busy">
          <td colspan="6" class="text-center text-muted py-4">
            No employees for this month. Create the month on Dashboard and open Attendance first.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-backdrop fade impress-blur-backdrop" [class.show]="periodOpen" *ngIf="periodOpen" (click)="closePeriodPanel()"></div>
<div
  class="modal fade impress-modal-layer"
  [class.show]="periodOpen"
  [style.display]="periodOpen ? 'block' : 'none'"
  tabindex="-1"
  (click)="closePeriodPanel()"
>
  <div class="modal-dialog modal-dialog-centered" (click)="$event.stopPropagation()">
    <div class="modal-content border border-warning border-2">
      <div class="modal-header">
        <h5 class="modal-title">Pay period</h5>
        <button type="button" class="btn-close" (click)="closePeriodPanel()"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Month</label>
          <select class="form-select" [(ngModel)]="draftMonth">
            <option *ngFor="let m of monthNames; let i = index" [ngValue]="i + 1">{{ m }}</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Year</label>
          <select class="form-select" [(ngModel)]="draftYear">
            <option *ngFor="let y of yearOptions" [ngValue]="y">{{ y }}</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closePeriodPanel()">Cancel</button>
        <button type="button" class="btn btn-primary" (click)="applyPeriodPanel()">Apply</button>
      </div>
    </div>
  </div>
</div>
